<!DOCTYPE html>
<html>
<head>
  <title>Cartoonify Me 🎨</title>
  <link rel="stylesheet" href="styles.css">
  <meta charset="UTF-8">
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
</head>
<body>

  <h1>Cartoonify Me ✨</h1>

  <button onclick="openModal()">Start</button>

  <div id="flowModal" class="modal hidden">
    <div class="modal-content">
      <div class="step" id="step-1">
        <div class="subtitle">Select one or more</div>
        <div class="options">

          <div class="option" data-value="portrait">Portrait</div>
          <div class="option" data-value="invitation">Invitation</div>
          <div class="option" data-value="banner">Banner</div>
          <div class="option" data-value="thankyou">Thank You</div>

        </div>

        <button id="nextStep1" disabled>Next</button>

      </div>
      <div id="step-2" class="step">
        <h2>Choose a theme</h2>
        <div class="carousel">
          <button class="arrow left">‹</button>
          <div class="card-grid options">
            <div class="option" data-theme="classic">Classic</div>
            <div class="option" data-theme="princess">Princess</div>
            <div class="option" data-theme="fairy">Fairy</div>
            <div class="option" data-theme="candyland">Candyland</div>
            <div class="option" data-theme="minecraft">Minecraft</div>
            <div class="option" data-theme="hero">SUPERHERO</div>
            <div class="option" data-theme="advvemture">ADVENTURE</div>
          </div>
          <button class="arrow right">›</button>
        </div>
        <button id="themeNextBtn" disabled>Next</button>
      </div>
      <div id="step-4" class="step">
        <!-- inputs + upload -->
          <!-- ALWAYS visible -->
          <div id="commonFields">
            <input id="name" placeholder="Child’s Name" />
          </div>
          <!-- ONLY for invitation -->
          <div id="invitationFields">
            <input id="date" type="date" />
            <input id="time" type="time" />
            <input id="location" placeholder="Party Location" />
            <input id="rsvp" placeholder="RSVP Details" />
          </div>
          <!-- ONLY for portrait -->
          <div id="portraitFields" style="display: none;">
            <input 
              id="message" 
              type="text" 
              placeholder="e.g. You are my sunshine 💛" 
              maxlength="120"
            />
          </div>
      </div>
      <div id="step-5" class="step">
        <!-- loading -->
      </div>
      <div id="step-6" class="step">
        <!-- result -->
      </div>
      <div id="resultModal" class="modal hidden">
        <div class="modal-card">

          <button id="closeModal" class="modal-close">&times;</button>

          <h2>Your invitation is ready</h2>

          <div class="modal-preview">
            <div id="output"></div>
          </div>

          <div class="modal-actions">
            <button id="downloadInvitationBtn">Download Invitation</button>
            <button id="downloadCartoonBtn">Download Cartoon</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  
  <div id="v1-ui">
    <div class="subtitle">Create personalized kids birthday invitations in seconds</div>

    
    <div class="form-card">
      

      <button id="createBtn" class="primary-btn">
        Create My Invitation ✨
      </button>

      <div id="cartoonPreview"></div>
    </div>

    
  </div>
  <script src="script.js"></script>
</html>
