<!DOCTYPE html>
<html>
<head>
  <title>Cartoonify Me 🎨</title>
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <style>
    body {
      margin: 0;
      font-family: "Trebuchet MS", Arial, sans-serif;
      text-align: center;
      background: linear-gradient(to bottom, #fdf6ff, #eef6ff);
      color: #4a3b5c;
      padding: 30px 20px 60px;
    }

    h1 {
      font-size: 64px;
      margin-bottom: 10px;
      color: #5a3d85;
    }

    .subtitle {
      font-size: 20px;
      color: #8b72b5;
      margin-bottom: 30px;
    }

    .form-card {
      max-width: 420px;
      margin: 0 auto 30px;
      background: rgba(255, 255, 255, 0.75);
      border: 2px solid #eadcff;
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(122, 96, 170, 0.12);
      backdrop-filter: blur(4px);
    }

    input[type="file"] {
      margin-bottom: 18px;
    }

    input[type="text"],
    input[type="date"],
    input[type="time"] {
      width: 100%;
      max-width: 280px;
      padding: 12px 14px;
      margin: 8px 0;
      border: 2px solid #d9c4f6;
      border-radius: 14px;
      font-size: 18px;
      box-sizing: border-box;
      background: #fffdfd;
    }

    button {
      margin: 10px 8px 0;
      padding: 14px 22px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(to right, #caa8ff, #f7bfd8);
      color: #4b3568;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(167, 125, 210, 0.25);
    }

    button:hover {
      transform: translateY(-1px);
    }

    #output {
      margin-top: 28px;
    }

    #invitationCard {
      width: 420px;
      margin: 0 auto;
      padding: 22px;
      border-radius: 32px;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.95), rgba(255,255,255,0) 35%),
        linear-gradient(to bottom, #f7ecff, #ffeef6, #eef7ff);
      border: 3px solid #e8d6fb;
      box-shadow: 0 18px 40px rgba(125, 98, 173, 0.18);
      box-sizing: border-box;
      position: relative;
      overflow: hidden;
    }

    #invitationCard::before,
    #invitationCard::after {
      content: "✨";
      position: absolute;
      font-size: 28px;
      opacity: 0.55;
    }

    #invitationCard::before {
      top: 16px;
      left: 18px;
    }

    #invitationCard::after {
      bottom: 16px;
      right: 18px;
    }

    .invite-top {
      font-size: 14px;
      letter-spacing: 2px;
      color: #9b81bf;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .invite-title {
      font-size: 42px;
      line-height: 1.1;
      margin: 0 0 10px;
      color: #5a3d85;
    }

    .invite-name {
      font-size: 30px;
      font-weight: bold;
      color: #d06aa2;
      margin-bottom: 14px;
    }

    .photo-frame {
      width: 240px;
      height: 240px;
      margin: 16px auto 20px;
      padding: 10px;
      border-radius: 999px;
      background: linear-gradient(to bottom right, #fff, #f4e6ff);
      border: 4px solid #ead4ff;
      box-shadow: 0 8px 24px rgba(140, 110, 192, 0.16);
      box-sizing: border-box;
      overflow: hidden;
    }

    .photo-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 999px;
      display: block;
    }

    .details {
      background: rgba(255, 255, 255, 0.68);
      border: 2px solid #eddcff;
      border-radius: 22px;
      padding: 18px 18px 10px;
      margin-top: 10px;
    }

    .detail-line {
      font-size: 22px;
      margin: 10px 0;
      color: #5a4b74;
    }

    .footer-note {
      margin-top: 18px;
      font-size: 18px;
      color: #8e74b9;
      font-style: italic;
    }

    .castle {
      font-size: 34px;
      margin-bottom: 8px;
    }

    @media (max-width: 520px) {
      h1 {
        font-size: 48px;
      }

      #invitationCard {
        width: 100%;
        max-width: 390px;
      }

      .invite-title {
        font-size: 34px;
      }

      .invite-name {
        font-size: 26px;
      }

      .detail-line {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>

  <h1>Cartoonify Me 👑</h1>
  <div class="subtitle">Princess invitation magic ✨</div>

  <div class="form-card">
    <input type="file" id="photo" accept="image/*" /><br />

    <input type="text" id="name" placeholder="Name" /><br />
    <input type="text" id="date" placeholder="Date" /><br />
    <input type="text" id="time" placeholder="Time" /><br />
    <input type="text" id="rsvp" placeholder="RSVP" /><br />

    <button onclick="generateInvitation()">Generate Invitation</button>
    <button onclick="downloadInvitation()">Download Invitation</button>
  </div>

  <div id="output"></div>

  <script>
    function generateInvitation() {
      const name = document.getElementById("name").value || "Princess";
      const date = document.getElementById("date").value || "June 18";
      const time = document.getElementById("time").value || "5:00 PM";
      const rsvp = document.getElementById("rsvp").value || "Mom";
      const file = document.getElementById("photo").files[0];

      let imageHTML = `
        <div class="photo-frame">
          <div style="
            width:100%;
            height:100%;
            display:flex;
            align-items:center;
            justify-content:center;
            border-radius:999px;
            background:linear-gradient(to bottom right, #f9f2ff, #fff7fb);
            font-size:22px;
            color:#a78bc9;
            text-align:center;
            padding:20px;
            box-sizing:border-box;
          ">
            👑<br />Your princess photo here
          </div>
        </div>
      `;

      if (file) {
        const url = URL.createObjectURL(file);
        imageHTML = `
          <div class="photo-frame">
            <img src="${url}" alt="Uploaded photo" />
          </div>
        `;
      }

      const output = `
        <div id="invitationCard">
          <div class="castle">🏰 ✨ 👑 ✨ 🏰</div>
          <div class="invite-top">You are invited to a royal celebration</div>
          <div class="invite-title">A Princess Birthday</div>
          <div class="invite-name">${name}</div>

          ${imageHTML}

          <div class="details">
            <div class="detail-line">📅 <strong>${date}</strong></div>
            <div class="detail-line">⏰ <strong>${time}</strong></div>
            <div class="detail-line">💌 RSVP: <strong>${rsvp}</strong></div>
          </div>

          <div class="footer-note">Bibbidi bobbidi birthday ✨</div>
        </div>
      `;

      document.getElementById("output").innerHTML = output;
    }

    function downloadInvitation() {
      const card = document.getElementById("invitationCard");

      if (!card) {
        alert("Please generate the invitation first.");
        return;
      }

      html2canvas(card, {
        backgroundColor: null,
        scale: 2
      }).then(canvas => {
        const link = document.createElement("a");
        link.download = "princess-invitation.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
      });
    }
  </script>

</body>
</html>
