<!DOCTYPE html>
<html>
<head>
  <title>Cartoonify Me 🎨</title>
  <link rel="stylesheet" href="styles.css">
  <meta charset="UTF-8">
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
</head>
<body>

  <h1>Cartoonify Me ✨</h1>
  <div class="subtitle">Create personalized kids birthday invitations in seconds</div>

  <div class="form-card">
    <label for="photo" class="field-label">Upload your child’s photo</label>
    <input type="file" id="photo" accept="image/*" />
    <p class="helper-text">
      For best results, upload a half-body photo (face + upper body)
    </p>

    <label for="theme" class="field-label">Choose a theme</label>
    <select id="theme">
      <option value="princess">Princess</option>
      <option value="fairyland">Fairyland</option>
      <option value="superhero">Superhero</option>
    </select>

    <input id="name" type="text" placeholder="Child’s Name" />
    <input id="date" type="date" />
    <input id="time" type="time" />
    <input id="rsvp" type="text" placeholder="RSVP Details" />

    <button id="createBtn" class="primary-btn">
      Create Cartoon Invitation
    </button>

    <div id="cartoonPreview"></div>
  </div>

  <div id="resultModal" class="modal hidden">
    <div class="modal-card">

      <button id="closeModal" class="modal-close">&times;</button>

      <h2>Your invitation is ready</h2>

      <div class="modal-preview">
        <div id="output"></div>
      </div>

      <div class="modal-actions">
        <button id="downloadInvitationBtn">Download Invitation</button>
        <button id="downloadCartoonBtn">Download Cartoon</button>
      </div>

    </div>
  </div>
  <script src="script.js"></script>
</html>
