<!DOCTYPE html>
<html>
<head>
  <title>Cartoonify Me 🎨</title>
  <link rel="stylesheet" href="styles.css">
  <meta charset="UTF-8">
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
</head>
<body>

  <h1>Cartoonify Me 👑</h1>
  <div class="subtitle">Princess invitation magic ✨</div>

  <div class="form-card">
    <input type="file" id="photo" accept="image/*" /><br />
    <select id="theme">
      <option value="princess">👑 Princess</option>
      <option value="candy">🍭 Candyland</option>
      <option value="superhero">🍭 Super Hero</option>
    </select><br />

    <input type="text" id="name" placeholder="Name" /><br />
    <input type="text" id="date" placeholder="Date" /><br />
    <input type="text" id="time" placeholder="Time" /><br />
    <input type="text" id="rsvp" placeholder="RSVP" /><br />

    <button onclick="cartoonifyPhoto()">Cartoonify Photo</button>
    <div id="cartoonPreview"></div>
    <button onclick="generateInvitation()">Generate Invitation</button>
    <button onclick="downloadInvitation()">Download Invitation</button>
  </div>

  <div id="output"></div>
  <script src="script.js"></script>
</html>
